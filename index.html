<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hantavirus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrapper">
    <div id="game">
      <div id="background" class="scene-hallway"></div>
      <img id="priscilo" src="elements/img/priscilom1.png" alt="Priscilo" />
      <img id="rat" src="elements/img/rata1.png" alt="Rata" />
      <img id="door-arrow" class="hidden" src="elements/img/flechadown.png" alt="Puerta" />
      <img id="sanitizer-item" class="hidden" src="elements/img/sanitizer.png" alt="Gel hidroalcohólico" />
    </div>
  </div>

  <div id="hud" class="hidden">
    <img class="life" src="elements/img/life.png" alt="Vida" />
    <img class="life" src="elements/img/life.png" alt="Vida" />
    <img class="life" src="elements/img/life.png" alt="Vida" />
  </div>

  <!-- Controles táctiles (sólo visibles en dispositivos pointer:coarse) -->
  <div id="mobile-controls" aria-hidden="true">
    <div class="mc-left">
      <div class="mc-dpad">
        <button class="mc-btn mc-dpad-up"    data-key="ArrowUp"    aria-label="Arriba">
          <img src="elements/img/flechaARRIBA.png" alt="" />
        </button>
        <button class="mc-btn mc-dpad-left"  data-key="ArrowLeft"  aria-label="Izquierda">
          <img src="elements/img/flechaIZQ.png" alt="" />
        </button>
        <button class="mc-btn mc-dpad-down"  data-key="ArrowDown"  aria-label="Abajo">
          <img src="elements/img/flechaABAJO.png" alt="" />
        </button>
        <button class="mc-btn mc-dpad-right" data-key="ArrowRight" aria-label="Derecha">
          <img src="elements/img/flechaDRCH.png" alt="" />
        </button>
      </div>
    </div>
    <div class="mc-right">
      <button class="mc-btn mc-action" data-key="a" aria-label="Saltar (A)">
        <img src="elements/img/abutton.png" alt="" />
      </button>
      <button class="mc-btn mc-action" data-key="s" aria-label="Recoger (B)">
        <img src="elements/img/bbutton.png" alt="" />
      </button>
      <button class="mc-btn mc-action" data-key="c" aria-label="Disparar (C)">
        <img src="elements/img/cbutton.png" alt="" />
      </button>
    </div>
  </div>

  <!-- Botón de pausa (visible en móvil y desktop) -->
  <button id="pause-button" aria-label="Pausa">II</button>

  <!-- Aviso de orientación (sólo móvil en vertical) -->
  <div id="orientation-warning" class="hidden">
    <span class="orientation-text">Gira el dispositivo</span>
  </div>

  <div id="fade-screen"></div>

  <div id="start-screen">
    <img id="game-title" src="elements/img/hantavirustitle.png" alt="Hantavirus" />
    <img id="play-button" src="elements/img/playbutton.png" alt="Play" />
  </div>

  <div id="pause-screen" class="hidden">
    <span class="pause-text">PAUSED</span>
  </div>

  <div id="game-over" class="hidden">
    <span class="game-over-text">GAME OVER</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
